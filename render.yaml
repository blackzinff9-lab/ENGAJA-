services:
  - type: web
    name: engaja-02
    runtime: python
    buildCommand: npm install && npm run build && cp -r dist backend/dist
    startCommand: cd backend && pip install -r requirements.txt && python main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
      # OBRIGATÓRIA — IA para gerar conteúdo
      - key: GROQ_API_KEY
        sync: false
      # LOGIN GOOGLE — Obrigatórias para login real
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # OPCIONAIS — Tendências reais
      - key: YOUTUBE_API_KEY
        sync: false
      - key: TRENDSMCP_API_KEY
        sync: false
